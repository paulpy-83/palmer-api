server:
  ssl:
    key-store: file:${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}

spring:
  datasource:
    url: ${DB_URL}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: ${DB_SCHEMA}
        jdbc:
          fetch_size: 500

logging:
  level:
    root: WARN
    com.palmar: INFO

samba:
  host: ${SAMBA_HOST}
  share: ${SAMBA_SHARE}
  folder: ${SAMBA_FOLDER}
  domain: ${SAMBA_DOMAIN}
