server:
  port: 8282
  error:
    include-message: never
    include-exception: false
    include-stacktrace: never
  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - application/json
      - application/javascript
      - text/css
      - text/plain

spring:
  application:
    name: palmer-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST}:${DB_PORT}/${DB_SERVICE}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: palmer-hikari-pool
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1 FROM DUAL

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA}
        jdbc:
          fetch_size: 100

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://10.30.1.*:5173,http://10.30.2.*:5173,http://10.30.3.*:5173,http://10.30.4.*:5173,http://10.30.5.*:5173}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

samba:
  host: ${SAMBA_HOST}
  share: ${SAMBA_SHARE}
  folder: ${SAMBA_FOLDER:}
  user: ${SAMBA_USER}
  password: ${SAMBA_PASSWORD}
  domain: ${SAMBA_DOMAIN:WORKGROUP}

cache:
  imagenes:
    ttl-horas: ${CACHE_IMAGENES_TTL_HORAS:24}
    max-entradas: ${CACHE_IMAGENES_MAX_ENTRADAS:500}
  opciones:
    ttl-horas: ${CACHE_OPCIONES_TTL_HORAS:6}
